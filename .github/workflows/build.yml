name: Build iOS

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-ios:
    runs-on: macos-15
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Select Xcode
        run: sudo xcode-select -s /Applications/Xcode_16.2.app/Contents/Developer

      - name: Show build environment
        run: |
          xcodebuild -version
          swift --version

      - name: Resolve dependencies
        run: xcodebuild -resolvePackageDependencies -project LLMFarm.xcodeproj -scheme LLMFarm_Release

      - name: Build for iOS (no code signing)
        run: |
          xcodebuild build \
            -project LLMFarm.xcodeproj \
            -scheme LLMFarm_Release \
            -destination 'generic/platform=iOS' \
            CODE_SIGNING_ALLOWED=NO \
            COMPILER_INDEX_STORE_ENABLE=NO \
            -quiet

      - name: Archive for iOS
        run: |
          xcodebuild archive \
            -project LLMFarm.xcodeproj \
            -scheme LLMFarm_Release \
            -destination 'generic/platform=iOS' \
            -archivePath ${{ runner.temp }}/LLMFarm.xcarchive \
            CODE_SIGNING_ALLOWED=NO \
            COMPILER_INDEX_STORE_ENABLE=NO \
            -quiet

      - name: Export .app from archive
        run: |
          APP_PATH=$(find ${{ runner.temp }}/LLMFarm.xcarchive -name "*.app" -type d | head -1)
          echo "APP_PATH=$APP_PATH" >> $GITHUB_ENV
          echo "Found app at: $APP_PATH"

      - name: Create IPA
        run: |
          mkdir -p ${{ runner.temp }}/Payload
          cp -R "$APP_PATH" ${{ runner.temp }}/Payload/
          cd ${{ runner.temp }}
          zip -r LLMFarm.ipa Payload
          echo "IPA created: $(ls -lh LLMFarm.ipa)"

      - name: Upload IPA artifact
        uses: actions/upload-artifact@v4
        with:
          name: LLMFarm-iOS
          path: ${{ runner.temp }}/LLMFarm.ipa
          if-no-files-found: warn
          retention-days: 14
