name: Build iOS

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-ios:
    runs-on: macos-15
    timeout-minutes: 60

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Select Xcode
        run: sudo xcode-select -s /Applications/Xcode_16.2.app/Contents/Developer

      - name: Install iOS platform
        run: xcodebuild -downloadPlatform iOS

      - name: Show build environment
        run: |
          xcodebuild -version
          swift --version
          cmake --version
          xcodebuild -showsdks | grep -i ios

      # ── Build llama.xcframework from source ──────────────────────
      # llmfarm_core.swift's Package.swift expects a binary target at
      # llama.cpp/build-apple/llama.xcframework — we build it here.

      - name: Apply LLMFarm patches to llama.cpp
        run: |
          cd llmfarm_core.swift/patches
          bash apply_patches.sh || true

      - name: Build llama.cpp for iOS device (arm64)
        run: |
          cmake -S llmfarm_core.swift/llama.cpp -B build-ios-device \
            -DCMAKE_SYSTEM_NAME=iOS \
            -DCMAKE_OSX_ARCHITECTURES=arm64 \
            -DCMAKE_OSX_DEPLOYMENT_TARGET=16.4 \
            -DCMAKE_BUILD_TYPE=Release \
            -DGGML_METAL=ON \
            -DGGML_METAL_EMBED_LIBRARY=ON \
            -DBUILD_SHARED_LIBS=OFF \
            -DLLAMA_BUILD_EXAMPLES=OFF \
            -DLLAMA_BUILD_TESTS=OFF \
            -DLLAMA_BUILD_SERVER=OFF \
            -DLLAMA_CURL=OFF
          cmake --build build-ios-device --config Release -j $(sysctl -n hw.ncpu)

      - name: Build llama.cpp for iOS Simulator (arm64)
        run: |
          cmake -S llmfarm_core.swift/llama.cpp -B build-ios-sim \
            -DCMAKE_SYSTEM_NAME=iOS \
            -DCMAKE_OSX_ARCHITECTURES=arm64 \
            -DCMAKE_OSX_SYSROOT=$(xcrun --sdk iphonesimulator --show-sdk-path) \
            -DCMAKE_OSX_DEPLOYMENT_TARGET=16.4 \
            -DCMAKE_BUILD_TYPE=Release \
            -DGGML_METAL=OFF \
            -DBUILD_SHARED_LIBS=OFF \
            -DLLAMA_BUILD_EXAMPLES=OFF \
            -DLLAMA_BUILD_TESTS=OFF \
            -DLLAMA_BUILD_SERVER=OFF \
            -DLLAMA_CURL=OFF
          cmake --build build-ios-sim --config Release -j $(sysctl -n hw.ncpu)

      - name: Create llama.xcframework
        run: |
          set -e

          # Combine all static libs per platform into one archive
          echo "=== Device .a files ==="
          find build-ios-device -name "*.a" | sort
          libtool -static -o build-ios-device/libllama-all.a \
            $(find build-ios-device -name "*.a" | sort)

          echo "=== Simulator .a files ==="
          find build-ios-sim -name "*.a" | sort
          libtool -static -o build-ios-sim/libllama-all.a \
            $(find build-ios-sim -name "*.a" | sort)

          # Collect all public headers into one directory
          mkdir -p llama-headers
          cp -f llmfarm_core.swift/llama.cpp/include/*.h llama-headers/ 2>/dev/null || true
          cp -f llmfarm_core.swift/llama.cpp/ggml/include/*.h llama-headers/ 2>/dev/null || true

          # Create xcframework
          XCFW_PATH="llmfarm_core.swift/llama.cpp/build-apple/llama.xcframework"
          mkdir -p llmfarm_core.swift/llama.cpp/build-apple
          xcodebuild -create-xcframework \
            -library build-ios-device/libllama-all.a \
            -headers llama-headers \
            -library build-ios-sim/libllama-all.a \
            -headers llama-headers \
            -output "$XCFW_PATH"

          echo "✅ llama.xcframework created"
          ls -la "$XCFW_PATH"

      # ── Build the LLMFarm Xcode project ─────────────────────────

      - name: Resolve dependencies
        run: xcodebuild -resolvePackageDependencies -project LLMFarm.xcodeproj -scheme LLMFarm_Release

      - name: Build for iOS (no code signing)
        run: |
          xcodebuild build \
            -project LLMFarm.xcodeproj \
            -scheme LLMFarm_Release \
            -destination 'generic/platform=iOS' \
            CODE_SIGNING_ALLOWED=NO \
            COMPILER_INDEX_STORE_ENABLE=NO \
            -quiet

      - name: Archive for iOS
        run: |
          xcodebuild archive \
            -project LLMFarm.xcodeproj \
            -scheme LLMFarm_Release \
            -destination 'generic/platform=iOS' \
            -archivePath ${{ runner.temp }}/LLMFarm.xcarchive \
            CODE_SIGNING_ALLOWED=NO \
            COMPILER_INDEX_STORE_ENABLE=NO \
            -quiet

      - name: Export .app from archive
        run: |
          APP_PATH=$(find ${{ runner.temp }}/LLMFarm.xcarchive -name "*.app" -type d | head -1)
          echo "APP_PATH=$APP_PATH" >> $GITHUB_ENV
          echo "Found app at: $APP_PATH"

      - name: Create IPA
        run: |
          mkdir -p ${{ runner.temp }}/Payload
          cp -R "$APP_PATH" ${{ runner.temp }}/Payload/
          cd ${{ runner.temp }}
          zip -r LLMFarm.ipa Payload
          echo "IPA created: $(ls -lh LLMFarm.ipa)"

      - name: Upload IPA artifact
        uses: actions/upload-artifact@v4
        with:
          name: LLMFarm-iOS
          path: ${{ runner.temp }}/LLMFarm.ipa
          if-no-files-found: warn
          retention-days: 14
